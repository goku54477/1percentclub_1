<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Checkout - 1% Club</title>
    <meta name="description" content="Complete your order - Enter your shipping and contact information">
    <meta name="keywords" content="checkout, shipping, order, 1% club">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Checkout - 1% Club">
    <meta property="og:description" content="Complete your order">
    
    <!-- Twitter -->
    <meta name="twitter:title" content="Checkout - 1% Club">
    <meta name="twitter:description" content="Complete your order">

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #ffffff;
            --secondary-color: #0b0b0a;
            --luxury-gold: #c9a961;
            --text-light: #ffffff;
            --text-dark: #000000;
            --background-dark: #0b0b0a;
        }
    }

    @layer base {
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
    }

    @layer components {
        .checkout-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }
        
        .checkout-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 169, 97, 0.2);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 169, 97, 0.3);
            color: #ffffff;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--luxury-gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.1);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .submit-button {
            background: linear-gradient(135deg, var(--luxury-gold) 0%, #d4af37 100%);
            color: var(--secondary-color);
            border: none;
            padding: 1.25rem 3rem;
            font-size: 1.125rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            box-shadow: 0 8px 25px rgba(201, 169, 97, 0.4);
            width: 100%;
        }
        
        .submit-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #d4af37 0%, var(--luxury-gold) 100%);
            box-shadow: 0 12px 30px rgba(201, 169, 97, 0.5);
            transform: translateY(-2px);
        }
        
        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .back-to-cart-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(201, 169, 97, 0.4);
            color: var(--primary-color);
            padding: 0.875rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }
        
        .back-to-cart-btn:hover {
            background: rgba(201, 169, 97, 0.2);
            border-color: var(--luxury-gold);
        }
        
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        .progress-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .progress-circle.active {
            background: linear-gradient(135deg, var(--luxury-gold) 0%, #d4af37 100%);
            color: var(--secondary-color);
        }
        
        .progress-circle.inactive {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(201, 169, 97, 0.3);
        }
        
        .progress-line {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(201, 169, 97, 0.2);
            z-index: 1;
        }
    }
    </style>

</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" src="checkout-app.js"></script>
</body>
</html>
